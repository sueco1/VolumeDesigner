<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parametric Triangle Designer</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/svg2pdf.js/2.2.3/svg2pdf.umd.min.js"></script>
</head>
<body>

    <div id="controls">
        <h2>Canvas (mm)</h2>
        <div class="input-group">
            <label>Width (W)</label>
            <input type="number" id="rectWidth" value="600" min="50">
        </div>
        <div class="input-group">
            <label>Height (H)</label>
            <input type="number" id="rectHeight" value="400" min="50">
        </div>

        <h3>Triangle (mm)</h3>
        <div class="input-group">
            <label>Base (b)</label>
            <input type="number" id="triBase" value="80" min="10">
        </div>
        <div class="input-group">
            <label>Height (h)</label>
            <input type="number" id="triHeight" value="70" min="10">
        </div>

        <h3>Spacing</h3>
        <div class="checkbox-group">
            <input type="checkbox" id="fillMode" checked>
            <label for="fillMode">Fill with copies (Min 10mm)</label>
        </div>
        <div class="input-group">
            <label>Horizontal (Sh)</label>
            <input type="number" id="spacingHoriz" value="10" min="10" disabled>
        </div>
        <div class="input-group">
            <label>Vertical (Sv)</label>
            <input type="number" id="spacingVert" value="10" min="10" disabled>
        </div>

        <button id="exportPdf">Export Vector PDF</button>
    </div>

    <div id="viewer-container">
        <svg id="main-svg" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <polygon id="triUp" />
                <polygon id="triDown" />
                <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
                    <polygon points="0 0, 6 3, 0 6" fill="#555" />
                </marker>
            </defs>
            <g id="geometry-group">
                <rect id="outerRect" x="0" y="0" />
                <g id="triangleContainer"></g>
            </g>
            <g id="dimensions-group"></g>
        </svg>
    </div>

    <script src="script.js"></script>
</body>
</html>
